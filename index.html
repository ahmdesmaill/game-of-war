<!doctype html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Exo+2&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./styles.css" />
        <script defer src="./main.js"></script>
    </head>
    <body>
        <div class="top">
            <button id="new-deck-button">New Deck</button>
            <p aria-live="polite" id="remaining-cards-label"></p>
        </div>
        <h1 aria-live="polite" id="game-status-label">Game of War</h1>
        <p aria-live="polite" id="computer-score-label">Computer score: 0</p>
        <div aria-live="polite" id="card1-placeholder"></div>
        <div aria-live="polite" id="card2-placeholder"></div>
        <p aria-live="polite" id="player-score-label">My score: 0</p>
        <button id="draw-button">Draw</button>
    </body>
</html>
